<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #282c34;
            color: white;
        }
        
        h1 {
            margin-bottom: 10px;
        }
        /* Das Spielfeld-Gitter */
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
        }
        /* Die einzelnen Felder */
        
        .cell {
            width: 100px;
            height: 100px;
            background: #444b58;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .cell:hover {
            background: #5a6272;
        }
        
        .cell.taken {
            cursor: not-allowed;
        }
        /* Statusanzeige und Button */
        
        #status {
            margin: 20px;
            font-size: 1.5rem;
            height: 30px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #61afef;
            color: white;
        }
        
        button:hover {
            background: #4b8ccb;
        }
    </style>
</head>

<body>

    <h1>Tic Tac Toe</h1>
    <div id="status">Spieler X ist dran</div>

    <div class="board" id="board">
        <!-- 9 Felder werden per JavaScript erzeugt -->
    </div>

    <br>
    <button onclick="resetGame()">Spiel Neustarten</button>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;

        // Sieg-Kombinationen (Indizes im Array)
        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8], // Horizontal
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8], // Vertikal
            [0, 4, 8],
            [2, 4, 6] // Diagonal
        ];

        function createBoard() {
            boardElement.innerHTML = "";
            board.forEach((cell, index) => {
                const cellDiv = document.createElement('div');
                cellDiv.classList.add('cell');
                cellDiv.innerText = cell;
                cellDiv.addEventListener('click', () => handleMove(index));
                boardElement.appendChild(cellDiv);
            });
        }

        function handleMove(index) {
            if (board[index] !== "" || !gameActive) return;

            board[index] = currentPlayer;
            checkWinner();
            if (gameActive) {
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                statusElement.innerText = `Spieler ${currentPlayer} ist dran`;
            }
            createBoard();
        }

        function checkWinner() {
            for (let pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    statusElement.innerText = `Spieler ${board[a]} hat gewonnen! 🎉`;
                    gameActive = false;
                    return;
                }
            }
            if (!board.includes("")) {
                statusElement.innerText = "Unentschieden! 🤝";
                gameActive = false;
            }
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            statusElement.innerText = "Spieler X ist dran";
            createBoard();
        }

        createBoard(); // Initialisierung
    </script>
</body>

</html>
